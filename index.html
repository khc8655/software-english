<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Software English</title>
    <style>
        /* ===== Reset ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0F0F1A;
            --card: #1A1A2E;
            --card-hover: #22223A;
            --primary: #818CF8;
            --primary-dim: rgba(129,140,248,0.15);
            --text: #F1F5F9;
            --text-dim: #94A3B8;
            --text-muted: #64748B;
            --border: rgba(255,255,255,0.07);
            --success: #22C55E;
            --success-dim: rgba(34,197,94,0.12);
            --danger: #EF4444;
            --danger-dim: rgba(239,68,68,0.12);
            --radius: 10px;
            --radius-lg: 14px;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .screen {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        /* ===== Top Bar ===== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px 8px;
            flex-shrink: 0;
        }
        .topbar-left { display: flex; gap: 6px; }
        .topbar-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
        .topbar-right { display: flex; gap: 2px; }
        .icon-btn {
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none;
            color: var(--text-dim);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.15s, color 0.15s;
        }
        .icon-btn:active { background: var(--card); }
        .icon-btn.active { color: var(--primary); }

        /* ===== Main Content ===== */
        .main { flex: 1; padding: 0 14px 90px; overflow-y: auto; }

        /* ===== Calendar ===== */
        .cal-card { margin-bottom: 10px; }
        .cal-nav {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px;
        }
        .cal-nav-btn {
            background: none; border: none; color: var(--text-dim);
            font-size: 16px; cursor: pointer; padding: 4px 8px;
            border-radius: 6px; transition: background 0.15s;
        }
        .cal-nav-btn:active { background: var(--card); }
        .cal-month { font-size: 14px; font-weight: 600; color: var(--text); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
        .cal-wday { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 3px 0; }
        .cal-cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 500; border-radius: 50%;
            color: var(--text-dim);
        }
        .cal-empty { }
        .cal-today { border: 2px solid var(--primary); color: var(--primary); font-weight: 700; }
        .cal-learned { background: var(--primary); color: #fff; font-weight: 600; }
        .cal-future { color: var(--text-muted); opacity: 0.4; }
        .cal-done-full { background: var(--success); color: #fff; font-weight: 600; }

        /* ===== Entry Buttons ===== */
        .entry-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            margin-bottom: 10px;
        }
        .entry-btn {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 16px 12px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; transition: transform 0.12s, background 0.12s;
        }
        .entry-btn:active { transform: scale(0.96); background: var(--card-hover); }
        .entry-btn-label { font-size: 15px; font-weight: 700; color: var(--text); }
        .entry-btn-sub { font-size: 12px; color: var(--text-dim); }
        .entry-btn.learn { border-color: rgba(129,140,248,0.2); }
        .entry-btn.review { border-color: rgba(239,68,68,0.2); }
        .entry-btn.review .entry-btn-label { color: var(--danger); }

        /* ===== Quick Chips ===== */
        .quick-chips { display: flex; gap: 6px; }
        .chip {
            flex: 1; background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 7px 10px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            font-size: 12px; font-weight: 600; color: var(--text-dim);
            cursor: pointer; transition: transform 0.1s;
        }
        .chip:active { transform: scale(0.96); }
        .chip-count { font-size: 11px; background: var(--danger-dim); color: var(--danger); padding: 1px 5px; border-radius: 10px; }
        .chip-count.warn { background: var(--success-dim); color: var(--success); }

        /* ===== Flashcard ===== */
        .flashcard {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 22px 18px;
            box-shadow: var(--shadow); margin-bottom: 10px;
        }
        .fc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .fc-cat { font-size: 11px; font-weight: 600; color: var(--text-muted); }
        .fc-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; padding: 2px 4px; border-radius: 4px; transition: color 0.15s; }
        .fc-btn:active { color: var(--primary); }
        .fc-btn.starred { color: #F59E0B; }
        .fc-word { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .fc-phon { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-align: center; font-family: "SF Mono", monospace; }
        .fc-zh { font-size: 16px; font-weight: 600; color: var(--text); text-align: center; margin-bottom: 4px; }
        .fc-example { font-size: 12px; color: var(--text-dim); font-style: italic; background: rgba(255,255,255,0.04); padding: 8px 10px; border-radius: 8px; margin-top: 8px; line-height: 1.5; }

        /* ===== Rating Buttons ===== */
        .rating-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .rate-btn {
            padding: 13px; border: none; border-radius: var(--radius);
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: transform 0.1s, opacity 0.15s;
        }
        .rate-btn:active { transform: scale(0.96); }
        .rate-btn.wrong { background: var(--danger-dim); color: var(--danger); }
        .rate-btn.right { background: var(--success-dim); color: var(--success); }

        /* ===== Complete Card ===== */
        .complete-card {
            background: var(--card); border-radius: var(--radius-lg);
            padding: 36px 20px; text-align: center;
            border: 1px solid var(--border);
        }
        .complete-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
        .complete-sub { font-size: 13px; color: var(--text-dim); }

        /* ===== Progress Bar ===== */
        .prog-row { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; color: var(--text-dim); }
        .prog-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.4s ease; }
        .prog-text { min-width: 36px; text-align: right; color: var(--primary); }

        /* ===== Bottom Bar ===== */
        .bottombar {
            position: fixed; bottom: 0; left: 0; right: 0;
            max-width: 420px; margin: 0 auto;
            padding: 10px 14px max(10px, env(safe-area-inset-bottom));
            background: rgba(15,15,26,0.92); backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .btn-primary {
            display: block; width: 100%; padding: 13px;
            background: var(--primary); color: #fff;
            border: none; border-radius: var(--radius);
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
        .bottom-prog { margin-bottom: 8px; }

        /* ===== Modal ===== */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 200;
            align-items: flex-end; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-sheet {
            background: var(--card); border-radius: 16px 16px 0 0;
            width: 100%; max-width: 420px;
            max-height: 80vh; overflow-y: auto;
            padding: 16px 14px max(16px, env(safe-area-inset-bottom));
        }
        .modal-handle { width: 36px; height: 4px; background: var(--text-muted); border-radius: 2px; margin: 0 auto 14px; opacity: 0.4; }
        .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .modal-title { font-size: 16px; font-weight: 800; color: var(--text); }
        .modal-close { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; padding: 4px 6px; }
        .bank-stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .bank-stat { background: var(--bg); border-radius: var(--radius); padding: 10px 8px; text-align: center; }
        .bank-stat-n { font-size: 20px; font-weight: 800; color: var(--primary); }
        .bank-stat-l { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .modal-item {
            background: var(--bg); border-radius: var(--radius); padding: 11px 12px;
            margin-bottom: 6px; display: flex; justify-content: space-between; align-items: flex-start;
        }
        .modal-item-en { font-size: 14px; font-weight: 700; color: var(--text); }
        .modal-item-zh { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
        .modal-item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-left: 8px; }
        .modal-item-rm { background: none; border: none; color: var(--danger); font-size: 16px; cursor: pointer; padding: 2px 4px; }

        /* ===== Empty State ===== */
        .empty-state { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: 13px; }

        /* ===== Hidden ===== */
        .hidden { display: none !important; }

        /* ===== View transitions ===== */
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>
<div class="screen">

    <!-- ===== TOP BAR ===== -->
    <div class="topbar" id="topbar">
        <div class="topbar-left">
            <span class="topbar-title">Software English</span>
        </div>
        <div class="topbar-right">
            <button class="icon-btn" id="btn-bank" onclick="openBank()" title="生词本">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button class="icon-btn" id="btn-errors" onclick="openErrors()" title="错题本">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </button>
        </div>
    </div>

    <!-- ===== HOME VIEW ===== -->
    <div class="main view active" id="view-home"></div>

    <!-- ===== LEARN VIEW ===== -->
    <div class="main view" id="view-learn"></div>

    <!-- ===== REVIEW VIEW ===== -->
    <div class="main view" id="view-review"></div>

    <!-- ===== BOTTOM BAR ===== -->
    <div class="bottombar hidden" id="bottombar">
        <div class="bottom-prog hidden" id="bottom-prog">
            <div class="prog-row">
                <span id="bp-label">学习进度</span>
                <div class="prog-bar"><div class="prog-fill" id="bp-fill"></div></div>
                <span class="prog-text" id="bp-text">0/10</span>
            </div>
        </div>
        <button class="btn-primary" id="bottom-home-btn" onclick="goHome()">
            返回首页
        </button>
    </div>

</div>

<!-- ===== Bank Modal ===== -->
<div class="modal-overlay" id="modal-bank">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-head">
            <div class="modal-title">生词本</div>
            <button class="modal-close" onclick="closeModal('modal-bank')">×</button>
        </div>
        <div id="bank-body"></div>
    </div>
</div>

<!-- ===== Error Modal ===== -->
<div class="modal-overlay" id="modal-errors">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-head">
            <div class="modal-title">错题本</div>
            <button class="modal-close" onclick="closeModal('modal-errors')">×</div>
        </div>
        <div id="errors-body"></div>
    </div>
</div>

<script src="js/storage.js"></script>
<script src="app.js"></script>
</body>
</html>
