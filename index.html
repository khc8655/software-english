<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Software English</title>
    <style>
        /* ===== Reset & Base ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #5B5FF7; --primary-light: #8B8CFF; --primary-dark: #3D3DE8;
            --bg: #F0F1F9; --card: #FFFFFF; --text: #1A1A2E; --text-secondary: #6B6B80;
            --success: #22C55E; --success-bg: #F0FDF4; --warning: #F59E0B; --warning-bg: #FFFBEB;
            --danger: #EF4444; --danger-bg: #FEF2F2; --border: rgba(0,0,0,0.06);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12); --radius-sm: 10px; --radius-md: 16px; --radius-lg: 20px;
        }
        [data-theme="green"]  { --primary: #22C55E; --primary-light: #86EFAC; --primary-dark: #16A34A; --bg: #F0FDF4; }
        [data-theme="dark"]   { --primary: #818CF8; --primary-light: #A5B4FC; --bg: #0F0F1A; --card: #1A1A2E; --text: #F1F5F9; --text-secondary: #94A3B8; --border: rgba(255,255,255,0.08); --shadow-sm: 0 1px 3px rgba(0,0,0,0.3); --shadow-md: 0 4px 16px rgba(0,0,0,0.4); --shadow-lg: 0 8px 32px rgba(0,0,0,0.5); }
        [data-theme="orange"] { --primary: #F97316; --primary-light: #FDBA74; --bg: #FFF7ED; }
        [data-theme="simple"] { --primary: #374151; --primary-light: #9CA3AF; --bg: #F9FAFB; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; padding-bottom: 90px; transition: background 0.3s, color 0.3s; }

        /* ===== Header ===== */
        .header { text-align: center; padding: 8px 0 14px; }
        .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
        .theme-switcher { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .theme-btn { width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; font-size: 0; background: var(--primary); transition: transform 0.15s, box-shadow 0.15s; }
        .theme-btn[data-theme="blue"]   { background: #5B5FF7; }
        .theme-btn[data-theme="green"]  { background: #22C55E; }
        .theme-btn[data-theme="dark"]   { background: #1A1A2E; border-color: #4B4B6A; }
        .theme-btn[data-theme="orange"] { background: #F97316; }
        .theme-btn[data-theme="simple"] { background: #374151; }
        .theme-btn.active { transform: scale(1.2); box-shadow: 0 3px 10px rgba(91,95,247,0.4); }

        /* ===== Bottom Bar ===== */
        #bottomBar { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 16px max(10px, env(safe-area-inset-bottom)); background: var(--card); border-top: 1px solid var(--border); z-index: 100; box-shadow: 0 -2px 12px rgba(0,0,0,0.06); }
        #bottomMainBtn { display: block; width: 100%; padding: 14px; border: none; border-radius: var(--radius-md); font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: -0.2px; transition: opacity 0.15s, transform 0.1s; }
        #bottomMainBtn:active { transform: scale(0.98); }

        /* ===== Buttons ===== */
        .btn { display: inline-block; padding: 10px 18px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; transition: opacity 0.15s, transform 0.1s; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(91,95,247,0.3); }
        .btn-primary:active { opacity: 0.88; box-shadow: none; }
        .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }

        /* ===== Hero ===== */
        .hero { background: var(--card); border-radius: var(--radius-lg); padding: 22px 20px 18px; margin-bottom: 14px; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
        .hero-greeting { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); margin-bottom: 2px; }
        .hero-date { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; font-weight: 500; }
        .hero-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
        .hero-stat { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; }
        .hero-stat-num { font-size: 20px; font-weight: 800; color: var(--primary); line-height: 1.2; }
        .hero-stat-lbl { font-size: 10px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }
        .hero-progress-text { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
        .hero-progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
        .hero-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 4px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

        /* ===== Quick Actions ===== */
        .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .quick-btn { background: var(--card); border-radius: var(--radius-md); padding: 14px 14px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; text-align: left; width: 100%; }
        .quick-btn:active { transform: scale(0.97); box-shadow: var(--shadow-sm); }
        .quick-btn-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .quick-btn-icon.warning { background: var(--warning-bg); color: var(--warning); }
        .quick-btn-icon.danger  { background: var(--danger-bg);  color: var(--danger); }
        .quick-btn-text { flex: 1; min-width: 0; }
        .quick-btn-title { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .quick-btn-desc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .quick-btn-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; align-self: center; }
        .quick-btn-badge.warning { background: var(--warning-bg); color: var(--warning); }
        .quick-btn-badge.danger  { background: var(--danger-bg);  color: var(--danger); }

        /* ===== Section Title ===== */
        .section-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 10px; padding-left: 2px; }

        /* ===== Task Card ===== */
        .task-card { background: var(--card); border-radius: var(--radius-md); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .task-card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .task-card-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
        .task-done { background: linear-gradient(135deg, var(--success-bg), rgba(34,197,94,0.05)); border-radius: var(--radius-md); padding: 16px; margin-bottom: 14px; text-align: center; border: 1px solid rgba(34,197,94,0.2); }
        .task-done-title { font-size: 15px; font-weight: 700; color: var(--success); margin-bottom: 2px; }
        .task-done-desc { font-size: 12px; color: var(--text-secondary); }

        /* ===== Learn Mode ===== */
        .learn-header { display: flex; align-items: center; margin-bottom: 12px; font-size: 13px; font-weight: 600; color: var(--text-secondary); gap: 8px; }
        .learn-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
        .learn-card { background: var(--card); border-radius: var(--radius-lg); padding: 20px 18px; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
        .learn-word { font-size: 22px; font-weight: 800; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .learn-phon { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-family: "SF Mono", monospace; }
        .learn-zh { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .learn-example { font-size: 12px; color: var(--text-secondary); font-style: italic; line-height: 1.5; margin-top: 6px; padding: 8px; background: var(--bg); border-radius: 8px; }
        .learn-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .learn-complete { background: var(--card); border-radius: var(--radius-lg); padding: 32px 20px; text-align: center; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
        .complete-emoji { font-size: 52px; margin-bottom: 12px; }
        .complete-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
        .complete-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }

        /* ===== Practice Mode ===== */
        .study-header { margin-bottom: 14px; }
        .study-progress { display: flex; align-items: center; font-size: 13px; font-weight: 600; color: var(--text-secondary); gap: 8px; }
        .study-score { font-size: 13px; font-weight: 700; white-space: nowrap; }
        .study-card { background: var(--card); border-radius: var(--radius-lg); padding: 24px 20px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); margin-bottom: 14px; }
        .study-prompt { font-size: 22px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 16px; }
        .study-input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: var(--radius-md); font-size: 18px; font-weight: 600; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; text-align: center; letter-spacing: 1px; }
        .study-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,95,247,0.1); }
        .study-speak { display: flex; justify-content: center; margin-top: 10px; }
        .study-complete { background: var(--card); border-radius: var(--radius-lg); padding: 32px 20px; text-align: center; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .study-score-big { font-size: 56px; font-weight: 800; color: var(--primary); margin: 8px 0; line-height: 1; }
        .study-score-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
        .complete-pct { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .study-result { background: var(--card); border-radius: var(--radius-lg); padding: 24px 20px; text-align: center; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .result-icon { font-size: 48px; margin-bottom: 8px; }
        .result-word { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
        .result-phon { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .result-wrong-msg { font-size: 13px; color: var(--danger); margin-top: 6px; background: var(--danger-bg); padding: 6px 12px; border-radius: 8px; }
        .result-correct-msg { font-size: 13px; color: var(--success); margin-top: 4px; background: var(--success-bg); padding: 6px 12px; border-radius: 8px; }

        /* ===== Progress Bars ===== */
        .progress-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; flex: 1; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.4s ease; }

        /* ===== Category Tabs ===== */
        .category-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab { padding: 7px 14px; border-radius: 20px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; background: var(--card); color: var(--text-secondary); box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: background 0.15s, color 0.15s, transform 0.1s; }
        .category-tab:active { transform: scale(0.95); }
        .category-tab.active { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(91,95,247,0.3); }

        /* ===== Word Card (Browse) ===== */
        .card-grid { display: flex; flex-direction: column; gap: 8px; }
        .word-card { background: var(--card); border-radius: var(--radius-md); padding: 13px 14px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: transform 0.15s, box-shadow 0.15s; }
        .word-card:active { transform: scale(0.99); }
        .word-card.in-bank { border-color: rgba(245,158,11,0.3); background: linear-gradient(to right, var(--card), rgba(245,158,11,0.03)); }
        .word-card.in-error { border-color: rgba(239,68,68,0.3); background: linear-gradient(to right, var(--card), rgba(239,68,68,0.03)); }
        .word-main { flex: 1; min-width: 0; }
        .word-en { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .word-phon { font-size: 11px; color: var(--text-secondary); font-family: "SF Mono", monospace; }
        .word-zh { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
        .word-example { font-size: 11px; color: var(--text-secondary); font-style: italic; margin-top: 3px; line-height: 1.4; }
        .word-review-info { font-size: 10px; color: var(--primary); margin-top: 3px; font-weight: 600; }
        .mastered-badge { font-size: 10px; background: var(--success-bg); color: var(--success); padding: 1px 6px; border-radius: 6px; font-weight: 700; border: 1px solid rgba(34,197,94,0.2); }
        .card-actions { display: flex; gap: 4px; flex-shrink: 0; margin-left: 8px; }

        /* ===== Icon Buttons ===== */
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 6px; border-radius: 8px; transition: background 0.15s, opacity 0.15s; color: var(--text-secondary); line-height: 1; }
        .icon-btn:active { background: var(--bg); opacity: 0.7; }
        .icon-btn.speak-btn { font-size: 20px; }
        .icon-btn.bank-btn { font-size: 18px; }
        .icon-btn.bank-btn.active { color: var(--warning); }

        /* ===== Modals ===== */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); align-items: flex-end; justify-content: center; z-index: 200; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); border-radius: var(--radius-lg) var(--radius-lg) 0 0; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 20px 16px max(16px, env(safe-area-inset-bottom)); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-title { font-size: 17px; font-weight: 800; color: var(--text); }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px 8px; color: var(--text-secondary); line-height: 1; }
        .bank-modal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
        .bank-stat { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; }
        .bank-stat-num { font-size: 22px; font-weight: 800; color: var(--primary); }
        .bank-stat-lbl { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .modal-card { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
        .modal-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .modal-card-en { font-size: 15px; font-weight: 700; color: var(--text); }
        .modal-card-phon { font-size: 11px; color: var(--text-secondary); margin-top: 1px; font-family: "SF Mono", monospace; }
        .modal-card-zh { font-size: 13px; color: var(--text-secondary); margin-bottom: 2px; }
        .modal-card-example { font-size: 11px; color: var(--text-secondary); font-style: italic; margin-top: 4px; }
        .modal-card-actions { display: flex; gap: 6px; align-items: center; margin-top: 8px; flex-wrap: wrap; }

        /* ===== Empty State ===== */
        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-secondary); font-size: 14px; }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

        /* ===== Utility ===== */
        .hidden { display: none !important; }

        /* ===== Word Count Banner ===== */
        .word-count-banner { display: flex; justify-content: space-between; align-items: center; background: var(--card); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 10px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .banner-right { color: var(--primary); }

        /* ===== Calendar ===== */
        .cal-card { background: var(--card); border-radius: var(--radius-lg); padding: 14px 12px; margin-bottom: 10px; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
        .cal-header-row { margin-bottom: 10px; }
        .cal-month-label { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 8px; text-align: center; }
        .cal-weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
        .cal-wday-cell { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-secondary); padding: 3px 0; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(6, 1fr); gap: 3px; }
        .cal-day-empty { aspect-ratio: 1; }
        .cal-day-cell { width: 100%; aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--text-secondary); }
        .cal-today { border: 2px solid var(--primary); color: var(--primary); font-weight: 700; }
        .cal-learned { background: var(--primary); color: #fff; font-weight: 700; }
        .cal-future { opacity: 0.25; }

        /* ===== Today's Task Card ===== */
        .task-card { background: var(--card); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .task-today-row { display: flex; justify-content: center; align-items: center; gap: 0; }
        .task-today-stat { text-align: center; flex: 1; }
        .task-today-num { font-size: 32px; font-weight: 800; line-height: 1.2; }
        .task-today-lbl { font-size: 11px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }
        .task-today-divider { width: 1px; height: 40px; background: var(--border); margin: 0 8px; }
        .task-done { background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.04)); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; text-align: center; border: 1px solid rgba(34,197,94,0.2); }
        .task-done-title { font-size: 15px; font-weight: 700; color: var(--success); margin-bottom: 2px; }
        .task-done-desc { font-size: 12px; color: var(--text-secondary); }

        /* ===== Entry Grid (学习 / 复习) ===== */
        .entry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .entry-btn { background: var(--card); border-radius: var(--radius-md); padding: 18px 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; box-shadow: var(--shadow-md); border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; text-align: center; }
        .entry-btn:active { transform: scale(0.96); }
        .entry-btn-icon { font-size: 28px; margin-bottom: 2px; }
        .entry-btn-title { font-size: 15px; font-weight: 800; color: var(--text); }
        .entry-btn-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .entry-review { border-color: rgba(239,68,68,0.2); background: linear-gradient(135deg, var(--card), rgba(239,68,68,0.04)); }
        .entry-learn { border-color: rgba(91,95,247,0.2); background: linear-gradient(135deg, var(--card), rgba(91,95,247,0.04)); }

        /* ===== Quick Chips ===== */
        .quick-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .quick-chip { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 8px 12px; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; box-shadow: var(--shadow-sm); transition: transform 0.1s; }
        .quick-chip:active { transform: scale(0.97); }
        .chip-badge { font-size: 11px; background: var(--warning-bg); color: var(--warning); padding: 1px 6px; border-radius: 10px; font-weight: 700; }
        .chip-badge.danger { background: var(--danger-bg); color: var(--danger); }

        /* ===== Inline Speak Icon ===== */
        .speak-icon { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; color: var(--text-secondary); border-radius: 6px; line-height: 1; transition: background 0.15s, color 0.15s; vertical-align: middle; }
        .speak-icon:active { background: var(--bg); color: var(--primary); }
        .speak-icon-lg { background: var(--bg); border: none; cursor: pointer; font-size: 20px; padding: 8px; color: var(--text-secondary); border-radius: 50%; line-height: 1; transition: background 0.15s, color 0.15s; }
        .speak-icon-lg:active { background: var(--primary); color: #fff; }
        .speak-icon-sm { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px; color: var(--text-secondary); border-radius: 4px; line-height: 1; }

        /* ===== Star Button ===== */
        .star-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px; color: var(--text-secondary); border-radius: 6px; line-height: 1; transition: color 0.15s, transform 0.1s; }
        .star-btn:active { transform: scale(1.2); }
        .star-btn.active { color: var(--warning); }

        /* ===== Error Tag ===== */
        .error-tag { font-size: 10px; background: var(--danger-bg); color: var(--danger); padding: 2px 6px; border-radius: 6px; font-weight: 700; margin-left: 4px; vertical-align: middle; }

        /* ===== Learn Card ===== */
        .learn-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .learn-word { font-size: 18px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 2px; }
        .learn-nav-btns { display: flex; gap: 8px; margin-top: 12px; }
        .learn-progress-text { font-size: 13px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }

        /* ===== Study Card ===== */
        .study-word-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .study-word-en { font-size: 18px; font-weight: 700; color: var(--text-secondary); }
        .result-actions { display: flex; justify-content: center; margin-top: 8px; }
        .result-wrong { font-size: 13px; color: var(--danger); background: var(--danger-bg); padding: 6px 12px; border-radius: 8px; margin-top: 6px; }
        .result-correct { font-size: 13px; color: var(--success); background: var(--success-bg); padding: 6px 12px; border-radius: 8px; margin-top: 4px; }

        /* ===== Complete Card ===== */
        .complete-card { background: var(--card); border-radius: var(--radius-lg); padding: 32px 20px; text-align: center; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .complete-emoji { font-size: 56px; margin-bottom: 12px; }
        .complete-score-big { font-size: 52px; font-weight: 800; color: var(--primary); line-height: 1.1; margin: 8px 0; }
        .complete-pct { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }

        /* ===== Error Summary Card ===== */
        .error-summary-card { background: linear-gradient(135deg, rgba(239,68,68,0.08), rgba(239,68,68,0.03)); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(239,68,68,0.15); }
        .error-summary-title { font-size: 15px; font-weight: 700; color: var(--danger); }
        .error-summary-count { font-size: 28px; font-weight: 800; color: var(--danger); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Software English</h1>
        <div class="theme-switcher" id="themeSwitcher">
            <button class="theme-btn" data-theme="blue"   onclick="setTheme('blue')"></button>
            <button class="theme-btn" data-theme="green"  onclick="setTheme('green')"></button>
            <button class="theme-btn" data-theme="dark"   onclick="setTheme('dark')"></button>
            <button class="theme-btn" data-theme="orange"  onclick="setTheme('orange')"></button>
            <button class="theme-btn" data-theme="simple"  onclick="setTheme('simple')"></button>
        </div>
    </div>

    <div id="app"></div>

    <!-- Word Bank Modal -->
    <div class="modal" id="bankModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">生词本</div>
                <button class="modal-close" onclick="closeBankBook()">×</button>
            </div>
            <div id="bankBody"></div>
        </div>
    </div>

    <!-- Error Book Modal -->
    <div class="modal" id="errorModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">错题本</div>
                <button class="modal-close" onclick="closeErrorBook()">×</button>
            </div>
            <div id="errorBody"></div>
        </div>
    </div>

    <!-- Bottom bar -->
    <div id="bottomBar">
        <button id="bottomMainBtn" class="btn btn-primary"></button>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
